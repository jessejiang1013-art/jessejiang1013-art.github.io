<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酱肉包的个人主页</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: "Microsoft YaHei", sans-serif;
    min-height:100vh;
    background: linear-gradient(135deg,#6a5acd,#ff8fd8);
    color:white;
    overflow-x:hidden;
}

header{
    text-align:center;
    padding:80px 20px;
}

.avatar{
    width:160px;
    height:160px;
    border-radius:50%;
    background:white;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:70px;
    box-shadow:0 0 30px rgba(255,255,255,0.5);
}

h1{
    margin-top:20px;
    font-size:3rem;
}

.subtitle{
    margin-top:10px;
    opacity:0.9;
}

.card{
    max-width:900px;
    margin:30px auto;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:15px;
}

.tags{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.tag{
    background:rgba(255,255,255,0.2);
    padding:10px 15px;
    border-radius:999px;
}

footer{
    text-align:center;
    padding:40px;
    opacity:0.8;
}

.floating{
    position:fixed;
    font-size:25px;
    animation:float 10s linear infinite;
    opacity:0.7;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100px);
    }
}

button{
    background:white;
    color:#6a5acd;
    border:none;
    padding:12px 24px;
    border-radius:999px;
    cursor:pointer;
    font-size:16px;
    margin-top:20px;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>
<body>

<div class="floating" style="left:10%;">🌸</div>
<div class="floating" style="left:30%;animation-delay:2s;">✨</div>
<div class="floating" style="left:50%;animation-delay:4s;">⭐</div>
<div class="floating" style="left:70%;animation-delay:1s;">🌸</div>
<div class="floating" style="left:90%;animation-delay:6s;">✨</div>

<header>
    <div class="avatar">🍜</div>
    <h1>酱肉包</h1>
    <p class="subtitle">欢迎来到我的动漫小世界 ✨</p>

    <button onclick="showMessage()">
        点我互动
    </button>
</header>

<section class="card">
    <h2>关于我</h2>
    <p>
        大家好，我是酱肉包。
        喜欢动漫、探索科技、研究投资理财，
        也喜欢发现生活中有趣的新鲜事物。
    </p>
</section>

<section class="card">
    <h2>兴趣爱好</h2>
    <div class="tags">
        <div class="tag">🎌 动漫</div>
        <div class="tag">🎮 游戏</div>
        <div class="tag">📈 投资</div>
        <div class="tag">🤖 AI科技</div>
        <div class="tag">🐱 猫咪</div>
        <div class="tag">✈️ 旅行</div>
    </div>
</section>

<section class="card">
    <h2>我的目标</h2>
    <p>
        持续学习新知识，探索更广阔的世界，
        用科技和创意让生活变得更有趣。
    </p>
</section>

<footer>
    © 2026 酱肉包 · Anime Homepage
</footer>

<script>
function showMessage(){
    const messages = [
        "今天也要元气满满！🌸",
        "欢迎来到酱肉包的主页！✨",
        "MOJI TESTING ⭐",
        "祝你今天拥有好心情！🍜"
    ];

    const random =
        messages[Math.floor(Math.random()*messages.length)];

    alert(random);
}
</script>

</body>
</html>
